<!doctype html><html lang="en"><head><meta charset="utf-8"/><title>ferromotion — batched MPPI rollouts on the GPU</title></head>
<body><pre id="log">running…</pre>
<script type="module">
// MPPI's expensive step is rolling out K sampled control sequences through the dynamics. That's the
// "fleet" kernel: here, K parallel rollouts of a 2-link manipulator (closed-form M,C,G) over a horizon,
// each thread one sample, accumulating cost. Verified against an identical CPU reference on the SAME
// uploaded control samples, and timed at scale — the heavy kernel that earns the GPU (unlike light FK).

// Shared 2R model constants.
const M1=1.0,M2=1.0,L1=1.0,LC1=0.5,LC2=0.5,I1=0.1,I2=0.1,G=9.81;

const WGSL = `
struct P { k:u32, horizon:u32, dt:f32, wq:f32, wqd:f32, wterm:f32, rctrl:f32, _pad:f32,
           q0x:f32, q0y:f32, gx:f32, gy:f32 };
@group(0) @binding(0) var<storage, read>       ctrl : array<f32>;   // K*H*2 sampled torques
@group(0) @binding(1) var<storage, read_write>  cost : array<f32>;   // K
@group(0) @binding(2) var<uniform>              p    : P;

const M1=1.0; const M2=1.0; const L1=1.0; const LC1=0.5; const LC2=0.5;
const I1=0.1; const I2=0.1; const GRAV=9.81;

@compute @workgroup_size(64)
fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
  let s = gid.x;
  if (s >= p.k) { return; }
  var q1 = p.q0x; var q2 = p.q0y;
  var d1 = 0.0;  var d2 = 0.0;
  var c = 0.0;
  let base = s * p.horizon * 2u;
  for (var t = 0u; t < p.horizon; t = t + 1u) {
    let t1 = ctrl[base + t*2u];
    let t2 = ctrl[base + t*2u + 1u];
    let cc = cos(q2); let ss = sin(q2);
    let a = I1 + I2 + M1*LC1*LC1 + M2*(L1*L1 + LC2*LC2 + 2.0*L1*LC2*cc);
    let b = I2 + M2*(LC2*LC2 + L1*LC2*cc);
    let dd = I2 + M2*LC2*LC2;
    let h = -M2*L1*LC2*ss;
    let c1 = h*d2*(2.0*d1 + d2);
    let c2 = -h*d1*d1;
    let g1 = (M1*LC1 + M2*L1)*GRAV*cos(q1) + M2*LC2*GRAV*cos(q1+q2);
    let g2 = M2*LC2*GRAV*cos(q1+q2);
    let r1 = t1 - c1 - g1;
    let r2 = t2 - c2 - g2;
    let det = a*dd - b*b;
    let a1 = (dd*r1 - b*r2)/det;
    let a2 = (-b*r1 + a*r2)/det;
    d1 = d1 + a1*p.dt; d2 = d2 + a2*p.dt;
    q1 = q1 + d1*p.dt; q2 = q2 + d2*p.dt;
    let e1 = q1 - p.gx; let e2 = q2 - p.gy;
    c = c + p.wq*(e1*e1 + e2*e2) + p.wqd*(d1*d1 + d2*d2) + p.rctrl*(t1*t1 + t2*t2);
  }
  let f1 = q1 - p.gx; let f2 = q2 - p.gy;
  cost[s] = c + p.wterm*(f1*f1 + f2*f2);
}`;

function cpuRollout(ctrl, K, H, dt, w, q0, goal) {
  const costs = new Float64Array(K);
  for (let s = 0; s < K; s++) {
    let q1 = q0[0], q2 = q0[1], d1 = 0, d2 = 0, c = 0;
    const base = s * H * 2;
    for (let t = 0; t < H; t++) {
      const t1 = ctrl[base + t*2], t2 = ctrl[base + t*2 + 1];
      const cc = Math.cos(q2), ssn = Math.sin(q2);
      const a = I1 + I2 + M1*LC1*LC1 + M2*(L1*L1 + LC2*LC2 + 2*L1*LC2*cc);
      const b = I2 + M2*(LC2*LC2 + L1*LC2*cc);
      const dd = I2 + M2*LC2*LC2;
      const h = -M2*L1*LC2*ssn;
      const c1 = h*d2*(2*d1 + d2), c2 = -h*d1*d1;
      const g1 = (M1*LC1 + M2*L1)*G*Math.cos(q1) + M2*LC2*G*Math.cos(q1+q2);
      const g2 = M2*LC2*G*Math.cos(q1+q2);
      const r1 = t1 - c1 - g1, r2 = t2 - c2 - g2;
      const det = a*dd - b*b;
      const a1 = (dd*r1 - b*r2)/det, a2 = (-b*r1 + a*r2)/det;
      d1 += a1*dt; d2 += a2*dt; q1 += d1*dt; q2 += d2*dt;
      const e1 = q1 - goal[0], e2 = q2 - goal[1];
      c += w.wq*(e1*e1 + e2*e2) + w.wqd*(d1*d1 + d2*d2) + w.rctrl*(t1*t1 + t2*t2);
    }
    const f1 = q1 - goal[0], f2 = q2 - goal[1];
    costs[s] = c + w.wterm*(f1*f1 + f2*f2);
  }
  return costs;
}

async function run() {
  if (!navigator.gpu) return { error: "WebGPU not available" };
  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) return { error: "no GPU adapter" };
  const device = await adapter.requestDevice();

  const K = 16384, H = 64, dt = 0.02;
  const q0 = [0.1, 0.1], goal = [1.0, -0.5];
  const w = { wq: 5.0, wqd: 0.5, wterm: 50.0, rctrl: 0.01 };
  const sigma = 2.0;

  // Sampled control sequences (shared by GPU and CPU — Box-Muller-ish via two uniforms).
  const ctrl = new Float32Array(K * H * 2);
  for (let i = 0; i < ctrl.length; i += 2) {
    const u1 = Math.random() || 1e-9, u2 = Math.random();
    const r = Math.sqrt(-2 * Math.log(u1));
    ctrl[i] = sigma * r * Math.cos(2 * Math.PI * u2);
    ctrl[i + 1] = sigma * r * Math.sin(2 * Math.PI * u2);
  }

  const ctrlBuf = device.createBuffer({ size: ctrl.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
  device.queue.writeBuffer(ctrlBuf, 0, ctrl);
  const costBuf = device.createBuffer({ size: K * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });
  const readBuf = device.createBuffer({ size: K * 4, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ });
  const pArr = new ArrayBuffer(48);
  new Uint32Array(pArr, 0, 2).set([K, H]);
  new Float32Array(pArr, 8, 10).set([dt, w.wq, w.wqd, w.wterm, w.rctrl, 0, q0[0], q0[1], goal[0], goal[1]]);
  const pBuf = device.createBuffer({ size: 48, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
  device.queue.writeBuffer(pBuf, 0, pArr);

  const module = device.createShaderModule({ code: WGSL });
  const pipeline = device.createComputePipeline({ layout: "auto", compute: { module, entryPoint: "main" } });
  const bind = device.createBindGroup({
    layout: pipeline.getBindGroupLayout(0),
    entries: [{ binding: 0, resource: { buffer: ctrlBuf } }, { binding: 1, resource: { buffer: costBuf } }, { binding: 2, resource: { buffer: pBuf } }],
  });

  async function dispatch(readBack) {
    const enc = device.createCommandEncoder();
    const pass = enc.beginComputePass();
    pass.setPipeline(pipeline); pass.setBindGroup(0, bind);
    pass.dispatchWorkgroups(Math.ceil(K / 64)); pass.end();
    if (readBack) enc.copyBufferToBuffer(costBuf, 0, readBuf, 0, K * 4);
    device.queue.submit([enc.finish()]);
    if (readBack) {
      await readBuf.mapAsync(GPUMapMode.READ);
      const out = new Float32Array(readBuf.getMappedRange().slice(0));
      readBuf.unmap();
      return out;
    }
    await device.queue.onSubmittedWorkDone();
    return null;
  }

  // Warm up (compile the pipeline / prime the queue) so the timed run is steady-state — a
  // receding-horizon MPPI loop dispatches every control step, so steady-state is the honest number.
  await dispatch(false);
  const t0 = performance.now();
  const gpu = await dispatch(true);
  const gpuMs = performance.now() - t0;

  cpuRollout(ctrl, K, H, dt, w, q0, goal); // warm the JIT too, fair
  const c0 = performance.now();
  const cpu = cpuRollout(ctrl, K, H, dt, w, q0, goal);
  const cpuMs = performance.now() - c0;

  let maxRel = 0;
  for (let s = 0; s < K; s++) {
    const denom = Math.max(1, Math.abs(cpu[s]));
    maxRel = Math.max(maxRel, Math.abs(gpu[s] - cpu[s]) / denom);
  }
  return { rollouts: K, horizon: H, maxRelErr: maxRel, gpuMs: +gpuMs.toFixed(1), cpuMs: +cpuMs.toFixed(1), speedup: +(cpuMs / gpuMs).toFixed(2) };
}

run().then((r) => { window.__result = r; document.getElementById("log").textContent = JSON.stringify(r, null, 2); })
     .catch((e) => { window.__result = { error: String(e) }; });
</script></body></html>
