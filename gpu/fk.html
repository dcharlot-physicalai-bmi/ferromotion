<!doctype html><html lang="en"><head><meta charset="utf-8"/><title>ferromotion — batched FK on the GPU</title></head>
<body><pre id="log">running…</pre>
<script type="module">
// Batched forward kinematics for a planar revolute chain, on the GPU via WebGPU compute.
// The "fleet" primitive: evaluate N robot configurations in parallel. Verified against a CPU
// reference of the identical FK. This is the same compute path native wgpu uses (WebGPU standard).
const WGSL = `
@group(0) @binding(0) var<storage, read>        q     : array<f32>;   // N*n joint angles
@group(0) @binding(1) var<storage, read>        links : array<f32>;   // n link lengths
@group(0) @binding(2) var<storage, read_write>  outp  : array<f32>;   // N*2 tip x,y
@group(0) @binding(3) var<uniform>              params: vec2<u32>;    // (N, n)

@compute @workgroup_size(64)
fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
  let idx = gid.x;
  let N = params.x;
  let n = params.y;
  if (idx >= N) { return; }
  var a = 0.0;
  var x = 0.0;
  var y = 0.0;
  for (var i = 0u; i < n; i = i + 1u) {
    a = a + q[idx * n + i];
    x = x + links[i] * cos(a);
    y = y + links[i] * sin(a);
  }
  outp[idx * 2u] = x;
  outp[idx * 2u + 1u] = y;
}`;

async function run() {
  if (!navigator.gpu) return { error: "WebGPU not available" };
  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) return { error: "no GPU adapter" };
  const device = await adapter.requestDevice();

  const N = 200000, n = 4;
  const links = new Float32Array([0.8, 0.8, 0.8, 0.5]);
  const q = new Float32Array(N * n);
  for (let i = 0; i < q.length; i++) q[i] = (Math.random() * 2 - 1) * Math.PI;

  const mk = (data, usage) => {
    const b = device.createBuffer({ size: data.byteLength, usage: usage | GPUBufferUsage.COPY_DST });
    device.queue.writeBuffer(b, 0, data);
    return b;
  };
  const qBuf = mk(q, GPUBufferUsage.STORAGE);
  const lBuf = mk(links, GPUBufferUsage.STORAGE);
  const pBuf = mk(new Uint32Array([N, n]), GPUBufferUsage.UNIFORM);
  const outBuf = device.createBuffer({ size: N * 2 * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });
  const readBuf = device.createBuffer({ size: N * 2 * 4, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ });

  const module = device.createShaderModule({ code: WGSL });
  const pipeline = device.createComputePipeline({ layout: "auto", compute: { module, entryPoint: "main" } });
  const bind = device.createBindGroup({
    layout: pipeline.getBindGroupLayout(0),
    entries: [
      { binding: 0, resource: { buffer: qBuf } },
      { binding: 1, resource: { buffer: lBuf } },
      { binding: 2, resource: { buffer: outBuf } },
      { binding: 3, resource: { buffer: pBuf } },
    ],
  });

  const t0 = performance.now();
  const enc = device.createCommandEncoder();
  const pass = enc.beginComputePass();
  pass.setPipeline(pipeline);
  pass.setBindGroup(0, bind);
  pass.dispatchWorkgroups(Math.ceil(N / 64));
  pass.end();
  enc.copyBufferToBuffer(outBuf, 0, readBuf, 0, N * 2 * 4);
  device.queue.submit([enc.finish()]);
  await readBuf.mapAsync(GPUMapMode.READ);
  const gpu = new Float32Array(readBuf.getMappedRange().slice(0));
  readBuf.unmap();
  const gpuMs = performance.now() - t0;

  // CPU reference (identical FK).
  let maxErr = 0;
  const c0 = performance.now();
  for (let k = 0; k < N; k++) {
    let a = 0, x = 0, y = 0;
    for (let i = 0; i < n; i++) { a += q[k * n + i]; x += links[i] * Math.cos(a); y += links[i] * Math.sin(a); }
    maxErr = Math.max(maxErr, Math.abs(x - gpu[k * 2]), Math.abs(y - gpu[k * 2 + 1]));
  }
  const cpuMs = performance.now() - c0;
  return { n: N, joints: n, maxErr, gpuMs: +gpuMs.toFixed(1), cpuMs: +cpuMs.toFixed(1) };
}

run().then((r) => { window.__result = r; document.getElementById("log").textContent = JSON.stringify(r, null, 2); })
     .catch((e) => { window.__result = { error: String(e) }; });
</script></body></html>
