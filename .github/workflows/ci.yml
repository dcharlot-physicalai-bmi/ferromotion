name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test + wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Test (native)
        run: cargo test --workspace
      - name: Benchmark (Ghia lid-driven cavity, release)
        run: cargo test -p ferromotion-fluid --release -- --ignored
      - name: Build (wasm32-unknown-unknown)
        run: >
          cargo build --target wasm32-unknown-unknown
          -p ferromotion-core -p ferromotion-control -p ferromotion-ruckig
          -p ferromotion-policy -p ferromotion-wasm -p ferromotion-fluid -p ferromotion-mpm -p ferromotion-cloth -p ferromotion-tactile -p ferromotion-rod
